<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FPL Transfer Suggestions</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4d;
      --text: #e6edf3;
      --muted: #8b9eb0;
      --accent: #58a6ff;
      --green: #3fb950;
      --red: #f85149;
    }
    * { box-sizing: border-box; }
    body {
      font-family: "SF Pro Text", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      min-height: 100vh;
      padding: 1.5rem;
    }
    .container { max-width: 640px; margin: 0 auto; }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }
    .subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    label {
      display: block;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }
    input {
      width: 100%;
      padding: 0.6rem 0.75rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 1rem;
    }
    input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    .row-3 { grid-template-columns: 1fr 1fr 1fr; }
    button {
      width: 100%;
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { filter: brightness(1.1); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .help {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 0.5rem;
    }
    .help a { color: var(--accent); }
    #results { display: none; }
    #results.visible { display: block; }
    .xpts-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    .xpts-value { font-size: 1.25rem; font-weight: 600; color: var(--green); }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    th, td { padding: 0.5rem 0.75rem; text-align: left; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 500; font-size: 0.8rem; text-transform: uppercase; }
    .delta-positive { color: var(--green); }
    .delta-negative { color: var(--red); }
    .cost { color: var(--muted); font-size: 0.85rem; }
    #error {
      display: none;
      color: var(--red);
      font-size: 0.9rem;
      margin-top: 1rem;
    }
    #error.visible { display: block; }
  </style>
</head>
<body>
  <div class="container">
    <h1>FPL Transfer Suggestions</h1>
    <p class="subtitle">Get one-transfer suggestions by expected points for your squad.</p>

    <div class="card">
      <form id="form">
        <div class="row row-3">
          <div>
            <label for="team_id">Team ID (FPL entry)</label>
            <input type="number" id="team_id" name="team_id" placeholder="e.g. 7302361" required min="1">
          </div>
          <div>
            <label for="gw">Gameweek</label>
            <input type="number" id="gw" name="gw" placeholder="e.g. 26" required min="1" max="38">
          </div>
          <div>
            <label for="bank">Bank (£m, optional)</label>
            <input type="number" id="bank" name="bank" placeholder="0" min="0" step="0.1">
          </div>
        </div>
        <p class="help">
          Find your Team ID in the FPL URL: <code>fantasy.premierleague.com/entry/<strong>12345</strong>/event/26</code>
        </p>
        <button type="submit" id="submit">Get suggestions</button>
      </form>
      <p id="error"></p>
    </div>

    <div class="card" id="results">
      <div class="xpts-header">
        <span>Your team xPts (next GW, no transfer)</span>
        <span class="xpts-value" id="current_xpts">—</span>
      </div>
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Sell</th>
            <th>Buy</th>
            <th>xPts Δ</th>
            <th>New xPts</th>
            <th>Cost Δ</th>
          </tr>
        </thead>
        <tbody id="suggestions_body"></tbody>
      </table>
    </div>
  </div>

  <script>
    const form = document.getElementById("form");
    const results = document.getElementById("results");
    const currentXpts = document.getElementById("current_xpts");
    const suggestionsBody = document.getElementById("suggestions_body");
    const errorEl = document.getElementById("error");
    const submitBtn = document.getElementById("submit");

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.classList.add("visible");
      results.classList.remove("visible");
    }

    function clearError() {
      errorEl.textContent = "";
      errorEl.classList.remove("visible");
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      clearError();
      submitBtn.disabled = true;

      const team_id = document.getElementById("team_id").value;
      const gw = document.getElementById("gw").value;
      const bank = document.getElementById("bank").value;

      const body = new FormData();
      body.append("team_id", team_id);
      body.append("gw", gw);
      if (bank !== "" && bank !== "0") body.append("bank", bank);

      try {
        const res = await fetch("/suggestions", {
          method: "POST",
          body,
        });
        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          showError(data.detail || res.statusText || "Request failed");
          return;
        }

        currentXpts.textContent = data.current_team_xpts.toFixed(2);
        suggestionsBody.innerHTML = (data.suggestions || []).map((s, i) => {
          const deltaClass = s.team_xpts_delta >= 0 ? "delta-positive" : "delta-negative";
          const costText = s.cost_delta_million === 0 ? "—" : (s.cost_delta_million > 0 ? "+" : "") + s.cost_delta_million + "£m";
          return `
            <tr>
              <td>${i + 1}</td>
              <td>${escapeHtml(s.out_web_name)}</td>
              <td>${escapeHtml(s.in_web_name)}</td>
              <td class="${deltaClass}">${s.team_xpts_delta >= 0 ? "+" : ""}${s.team_xpts_delta.toFixed(2)}</td>
              <td>${s.new_team_xpts.toFixed(2)}</td>
              <td class="cost">${costText}</td>
            </tr>
          `;
        }).join("");
        results.classList.add("visible");
      } catch (err) {
        showError(err.message || "Network error");
      } finally {
        submitBtn.disabled = false;
      }
    });

    function escapeHtml(s) {
      const div = document.createElement("div");
      div.textContent = s;
      return div.innerHTML;
    }
  </script>
</body>
</html>
